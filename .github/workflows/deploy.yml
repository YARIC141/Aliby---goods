name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 89.169.39.31 >> ~/.ssh/known_hosts

      - name: Deploy frontend
        run: |
          TS=$(date +%s)
          sed -i "1s/.*/\/\/ v${TS}/" client/sw.js
          sed -i "1s/.*/\/\/ v${TS}/" admin/sw.js
          rsync -az --delete client/ root@89.169.39.31:/var/www/alliby/client/
          rsync -az --delete admin/  root@89.169.39.31:/var/www/alliby/admin/

      - name: Deploy Edge Functions
        run: |
          rsync -az --delete supabase/functions/ root@89.169.39.31:/root/supabase/volumes/functions/
          ssh root@89.169.39.31 "cd /root/supabase && docker compose up -d --force-recreate functions"
