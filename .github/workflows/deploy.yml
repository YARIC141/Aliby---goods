name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 2222 -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy frontend
        run: |
          TS=$(date +%s)
          sed -i "1s/.*/\/\/ v${TS}/" client/sw.js
          sed -i "s/alliby-app-v[0-9]*/alliby-app-v${TS}/" client/sw.js
          sed -i "1s/.*/\/\/ v${TS}/" admin/sw.js
          sed -i "s/aliby-admin-app-v[0-9]*/aliby-admin-app-v${TS}/" admin/sw.js
          rsync -az --delete -e "ssh -p 2222" client/ root@${{ secrets.VPS_HOST }}:/var/www/alliby/client/
          rsync -az --delete -e "ssh -p 2222" admin/  root@${{ secrets.VPS_HOST }}:/var/www/alliby/admin/
          rsync -az --delete -e "ssh -p 2222" site/   root@${{ secrets.VPS_HOST }}:/var/www/alliby/site/

      - name: Apply database migrations
        run: |
          rsync -az -e "ssh -p 2222 -i ~/.ssh/id_ed25519" supabase/migrations/ root@${{ secrets.VPS_HOST }}:/tmp/alliby-mig/
          ssh -p 2222 root@${{ secrets.VPS_HOST }} "
            for f in \$(ls /tmp/alliby-mig/*.sql | sort); do
              base=\$(basename \"\$f\")
              num=\$(echo \"\$base\" | sed 's/20240101000//;s/_.*//')
              if [ \"\$num\" -eq \"\$num\" ] 2>/dev/null && [ \"\$num\" -ge 71 ]; then
                echo \">> \$base\"
                cat \"\$f\" | docker exec -i supabase-db psql -U postgres -d postgres
              fi
            done
          "
          ssh -p 2222 root@${{ secrets.VPS_HOST }} "docker restart supabase-rest 2>/dev/null || docker restart rest 2>/dev/null || true"

      - name: Deploy Edge Functions
        run: |
          rsync -az --delete -e "ssh -p 2222" supabase/functions/ root@${{ secrets.VPS_HOST }}:/root/supabase/volumes/functions/
          ssh -p 2222 root@${{ secrets.VPS_HOST }} "cd /root/supabase && docker compose up -d --force-recreate functions"
