openapi: 3.0.3
info:
  title: Aliby Foods API
  version: 1.0.0
  description: |
    REST API для приложения Aliby Foods.

    **Как начать:**
    1. В поле **server** выше укажите ваш Project Ref (из `https://app.supabase.com/project/<ref>`)
    2. Нажмите **Authorize** → введите `apikey` (anon key из Settings → API)
    3. Для защищённых запросов: сначала выполните `POST /auth/v1/token`, скопируйте
       `access_token` и введите в `bearerAuth`

    **Уровни доступа:**
    - `[публичный]` — не требует авторизации, только apikey-заголовок
    - `[user]` — требует Bearer JWT авторизованного пользователя
    - `[admin]` — требует Bearer JWT пользователя с ролью admin

servers:
  - url: https://{project_ref}.supabase.co
    description: Supabase Cloud
    variables:
      project_ref:
        default: your-project-ref
        description: Project Reference ID из Supabase Dashboard

tags:
  - name: Auth
    description: Регистрация, вход, управление сессией (Supabase Auth API)
  - name: Profiles
    description: Профили пользователей
  - name: Stores
    description: Заведения (кафе)
  - name: Categories
    description: Категории меню
  - name: Menu Items
    description: Позиции меню
  - name: Subscriptions
    description: Абонементы заведений (планы)
  - name: User Subscriptions
    description: Купленные абонементы пользователей
  - name: Orders
    description: Заказы (самовывоз)
  - name: Order Items
    description: Позиции заказа
  - name: Subscription Redemptions
    description: Записи о списаниях по абонементам
  - name: Payments
    description: Платежи
  - name: Map
    description: Растровая карта заведений (метаданные)
  - name: Markers
    description: Геометки на карте, привязанные к заведениям
  - name: Storage
    description: Файловое хранилище — фотографии меню и карта
  - name: Edge Functions
    description: Серверная логика (загрузка карты, абонементы, платежи)
  - name: App Config
    description: |
      Конфигурация приложения — управление зумом слоёв карты, цветами, надписями и feature-флагами UI.

      **Области действия (scope):**
      - `client` — конфиг для клиентского приложения
      - `admin` — конфиг для панели администратора

      **Workflow обновления (read-modify-write):**
      1. `GET /rest/v1/app_config?scope=eq.client` → скопировать текущий `config`
      2. Изменить нужные поля (например `vectorMap.layers.roads.minzoom`)
      3. `POST /rest/v1/rpc/set_app_config` с обновлённым объектом

      **Применение изменений:** перезагрузка страницы не нужна — изменения применяются
      при следующем открытии приложения пользователем (конфиг грузится при логине).

security:
  - apiKey: []

# ==============================================================
components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: apikey
      description: Anon Key из Supabase Dashboard → Settings → API
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT-токен из /auth/v1/token (access_token)

  parameters:
    selectParam:
      name: select
      in: query
      description: "Выбор полей: `*` или `id,name`, поддерживаются джойны `*,stores(*)`"
      schema:
        type: string
      example: "*"
    orderParam:
      name: order
      in: query
      description: "Сортировка: `column.asc` или `column.desc`"
      schema:
        type: string
      example: created_at.desc
    limitParam:
      name: limit
      in: query
      description: Максимальное количество строк
      schema:
        type: integer
        default: 100
    offsetParam:
      name: offset
      in: query
      description: Смещение для пагинации
      schema:
        type: integer
        default: 0
    preferHeader:
      name: Prefer
      in: header
      description: "`return=representation` — вернуть созданную/обновлённую запись"
      schema:
        type: string
        enum: [return=representation, return=minimal]

  schemas:
    # ---- App Config -------------------------------------------
    AppConfigRow:
      type: object
      properties:
        scope:
          type: string
          enum: [client, admin]
        config:
          $ref: '#/components/schemas/AppConfig'
        updated_at:
          type: string
          format: date-time

    AppConfig:
      type: object
      description: Полный конфиг приложения
      properties:
        vectorMap:
          type: object
          properties:
            tileSource:
              type: object
              description: Параметры источника тайлов
              properties:
                minzoom: { type: integer, minimum: 0, maximum: 22, example: 8 }
                maxzoom: { type: integer, minimum: 0, maximum: 22, example: 16 }
            layers:
              type: object
              description: |
                Минимальный зум появления каждого слоя карты.
                Чем выше значение — тем позже загружается слой, тем меньше трафика.
              properties:
                water:     { $ref: '#/components/schemas/LayerZoom' }
                land_use:  { $ref: '#/components/schemas/LayerZoom' }
                roads:     { $ref: '#/components/schemas/LayerZoom' }
                buildings: { $ref: '#/components/schemas/LayerZoom' }
                places:    { $ref: '#/components/schemas/LayerZoom' }
                addresses: { $ref: '#/components/schemas/LayerZoom' }
            labels:
              type: object
              description: Настройки подписей (зум появления + размер шрифта)
              properties:
                roads:     { $ref: '#/components/schemas/LabelConfig' }
                buildings: { $ref: '#/components/schemas/LabelConfig' }
                addresses: { $ref: '#/components/schemas/LabelConfig' }
                places:    { $ref: '#/components/schemas/LabelConfig' }
            colors:
              type: object
              description: HEX-цвета слоёв карты
              properties:
                background:    { type: string, example: "#f0ede8", description: "Фон карты" }
                water:         { type: string, example: "#9ecfdf", description: "Заливка водоёмов" }
                waterStroke:   { type: string, example: "#7ab8cc", description: "Контур водоёмов" }
                park:          { type: string, example: "#b8d8b8", description: "Парки и леса" }
                residential:   { type: string, example: "#f5f0e8", description: "Жилые кварталы" }
                buildingFill:  { type: string, example: "#e8e0d4", description: "Заливка зданий" }
                buildingLine:  { type: string, example: "#c8bfb0", description: "Контур зданий" }
                motorway:      { type: string, example: "#e8a020", description: "Магистрали" }
                primaryRoadBg: { type: string, example: "#c0b8a8", description: "Обводка главных дорог" }
                primaryRoad:   { type: string, example: "#ffffff", description: "Главные дороги" }
                tertiaryRoad:  { type: string, example: "#ffffff", description: "Второстепенные дороги" }
                path:          { type: string, example: "#c8b898", description: "Пешеходные дорожки" }
        ui:
          type: object
          properties:
            features:
              type: object
              description: |
                Feature-флаги навигационных разделов.
                `true` = показать, `false` = скрыть кнопку и секцию.

                **client:** sMap, sVectorMap, sStores, sMenu, sCart, sOrders, sSubscriptions, sMySubscriptions
                **admin:**  sStores, sCategories, sMenu, sSubscriptions, sOrders, sMap, sVectorMap
              additionalProperties:
                type: boolean
              example:
                sVectorMap: true
                sSubscriptions: false

    LayerZoom:
      type: object
      properties:
        minzoom:
          type: integer
          minimum: 0
          maximum: 22
          description: Минимальный зум отображения слоя

    LabelConfig:
      type: object
      properties:
        minzoom:
          type: integer
          minimum: 0
          maximum: 22
          description: Минимальный зум для появления подписей
        fontSize:
          type: number
          minimum: 6
          maximum: 24
          description: Размер шрифта подписей в пикселях

    # ---- Auth -------------------------------------------------
    SignupBody:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          minLength: 6
          example: secret123

    LoginBody:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: admin@aliby.ru
        password:
          type: string
          format: password
          example: secret123

    AuthSession:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: bearer
        expires_in:
          type: integer
          example: 3600
        user:
          $ref: '#/components/schemas/AuthUser'

    AuthUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
          example: authenticated

    # ---- Domain models ----------------------------------------
    Profile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        role:
          type: string
          enum: [user, admin]
        full_name:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    Store:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Кофейня Уголок
        address:
          type: string
          example: ул. Ленина, 15
        latitude:
          type: number
          format: double
          example: 55.751244
        longitude:
          type: number
          format: double
          example: 37.618423
        phone:
          type: string
          nullable: true
          example: "+7(495)123-45-67"
        working_hours:
          type: string
          nullable: true
          example: "Пн-Пт 8:00-20:00, Сб 9:00-18:00"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    StoreCreate:
      type: object
      required: [name, address, latitude, longitude]
      properties:
        name:
          type: string
          example: Новая кофейня
        address:
          type: string
          example: пр. Мира, 7
        latitude:
          type: number
          format: double
          example: 55.751244
        longitude:
          type: number
          format: double
          example: 37.618423
        phone:
          type: string
          example: "+7(495)111-22-33"
        working_hours:
          type: string
          example: "Ежедневно 9:00-22:00"

    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Напитки
        store_id:
          type: string
          format: uuid
          nullable: true
          description: "NULL = глобальная категория"
        created_at:
          type: string
          format: date-time

    CategoryCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Десерты
        store_id:
          type: string
          format: uuid
          nullable: true
          description: "NULL = глобальная категория"

    MenuItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        store_id:
          type: string
          format: uuid
        category_id:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
          example: Латте
        description:
          type: string
          nullable: true
          example: Классический латте с мягкой пенкой
        price:
          type: number
          format: double
          example: 250.00
        image_url:
          type: string
          nullable: true
          example: https://xxx.supabase.co/storage/v1/object/public/menu-photos/latte.jpg
        is_available:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time

    MenuItemCreate:
      type: object
      required: [store_id, name, price]
      properties:
        store_id:
          type: string
          format: uuid
        category_id:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
          example: Капучино
        description:
          type: string
          example: Эспрессо с молочной пенкой
        price:
          type: number
          example: 220.00
        image_url:
          type: string
          nullable: true
        is_available:
          type: boolean
          default: true

    CoverageRules:
      type: object
      properties:
        type:
          type: string
          enum: [all, include_categories, include_items, exclude_items]
          example: all
        category_ids:
          type: array
          items:
            type: string
            format: uuid
          description: "Используется при type=include_categories"
        item_ids:
          type: array
          items:
            type: string
            format: uuid
          description: "Используется при type=include_items"
        exclude_items:
          type: array
          items:
            type: string
            format: uuid

    TimeRules:
      type: object
      properties:
        weekdays:
          type: array
          items:
            type: integer
            minimum: 1
            maximum: 7
          example: [1,2,3,4,5]
          description: "1=Пн, 7=Вс. Пусто = все дни"
        time_start:
          type: string
          example: "08:00"
        time_end:
          type: string
          example: "20:00"
        excluded_dates:
          type: array
          items:
            type: string
            format: date
          example: ["2025-01-01", "2025-05-09"]

    UsageLimits:
      type: object
      properties:
        daily_limit:
          type: integer
          example: 2
          description: Максимум списаний в день
        min_interval_hours:
          type: number
          example: 1
          description: Минимальный интервал между списаниями (часы)
        min_order_amount:
          type: number
          example: 150
          description: Минимальная сумма заказа для применения

    Subscription:
      type: object
      properties:
        id:
          type: string
          format: uuid
        store_id:
          type: string
          format: uuid
        name:
          type: string
          example: Кофейная карта на 10 чашек
        price:
          type: number
          example: 1500.00
        duration_days:
          type: integer
          example: 30
        total_uses:
          type: integer
          example: 10
          description: "0 = безлимит"
        coverage_rules:
          $ref: '#/components/schemas/CoverageRules'
        time_rules:
          $ref: '#/components/schemas/TimeRules'
        usage_limits:
          $ref: '#/components/schemas/UsageLimits'
        created_at:
          type: string
          format: date-time

    SubscriptionCreate:
      type: object
      required: [store_id, name, price, duration_days]
      properties:
        store_id:
          type: string
          format: uuid
        name:
          type: string
          example: Кофейная карта на 5 чашек
        price:
          type: number
          example: 500.00
        duration_days:
          type: integer
          example: 30
        total_uses:
          type: integer
          default: 0
          example: 5
        coverage_rules:
          $ref: '#/components/schemas/CoverageRules'
        time_rules:
          $ref: '#/components/schemas/TimeRules'
        usage_limits:
          $ref: '#/components/schemas/UsageLimits'

    UserSubscription:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        subscription_id:
          type: string
          format: uuid
        purchase_date:
          type: string
          format: date-time
        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
          nullable: true
        remaining_uses:
          type: integer
          nullable: true
        used_today:
          type: integer
        last_used_at:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [pending, active, expired, cancelled]

    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        store_id:
          type: string
          format: uuid
        order_time:
          type: string
          format: date-time
        pickup_time:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [pending, paid, ready, issued, cancelled]
        total_amount:
          type: number
          example: 450.00
        payment_method:
          type: string
          enum: [card, subscription, mixed]
          nullable: true
        subscription_discount:
          type: number
          example: 0.00
        applied_user_subscription_id:
          type: string
          format: uuid
          nullable: true

    OrderCreate:
      type: object
      required: [user_id, store_id, total_amount]
      properties:
        user_id:
          type: string
          format: uuid
        store_id:
          type: string
          format: uuid
        pickup_time:
          type: string
          format: date-time
          nullable: true
        total_amount:
          type: number
          example: 700.00
        payment_method:
          type: string
          enum: [card, subscription, mixed]
          nullable: true
        applied_user_subscription_id:
          type: string
          format: uuid
          nullable: true

    OrderItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        order_id:
          type: string
          format: uuid
        menu_item_id:
          type: string
          format: uuid
        quantity:
          type: integer
          example: 2
        price_at_time:
          type: number
          example: 250.00

    OrderItemCreate:
      type: object
      required: [order_id, menu_item_id, quantity, price_at_time]
      properties:
        order_id:
          type: string
          format: uuid
        menu_item_id:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
          example: 2
        price_at_time:
          type: number
          example: 250.00

    SubscriptionRedemption:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_subscription_id:
          type: string
          format: uuid
        order_id:
          type: string
          format: uuid
          nullable: true
        redeemed_at:
          type: string
          format: date-time
        amount_discounted:
          type: number
          example: 250.00

    Payment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        order_id:
          type: string
          format: uuid
          nullable: true
        user_subscription_id:
          type: string
          format: uuid
          nullable: true
        amount:
          type: number
          example: 450.00
        status:
          type: string
          enum: [pending, succeeded, cancelled, failed]
        provider_transaction_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    Map:
      type: object
      properties:
        id:
          type: string
          format: uuid
        storage_path:
          type: string
          example: map.png
          description: Имя файла в бакете maps (для получения публичного URL)
        mime_type:
          type: string
          example: image/png
        width:
          type: integer
          example: 2048
          description: Ширина изображения в пикселях
        height:
          type: integer
          example: 1536
          description: Высота изображения в пикселях
        created_at:
          type: string
          format: date-time

    Marker:
      type: object
      properties:
        id:
          type: string
          format: uuid
        map_id:
          type: string
          format: uuid
        store_id:
          type: string
          format: uuid
        x:
          type: number
          format: double
          example: 340.5
          description: Пикселей от левого края (ось X вправо)
        y:
          type: number
          format: double
          example: 210.0
          description: Пикселей от нижнего края (ось Y вверх)
        created_at:
          type: string
          format: date-time

    MarkerCreate:
      type: object
      required: [map_id, store_id, x, y]
      properties:
        map_id:
          type: string
          format: uuid
          description: ID текущей карты
        store_id:
          type: string
          format: uuid
          description: Заведение, к которому привязана метка
        x:
          type: number
          format: double
          example: 340.5
        y:
          type: number
          format: double
          example: 210.0

    Error:
      type: object
      properties:
        message:
          type: string
        code:
          type: string
        details:
          type: string

# ==============================================================
paths:

  # ============================================================
  # AUTH
  # ============================================================

  /auth/v1/signup:
    post:
      tags: [Auth]
      summary: Регистрация нового пользователя
      operationId: signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupBody'
      responses:
        '200':
          description: Успешная регистрация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        '422':
          description: Email уже используется или слабый пароль

  /auth/v1/token:
    post:
      tags: [Auth]
      summary: Вход по email и паролю
      operationId: login
      parameters:
        - name: grant_type
          in: query
          required: true
          schema:
            type: string
            enum: [password, refresh_token]
          example: password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/LoginBody'
                - type: object
                  required: [refresh_token]
                  properties:
                    refresh_token:
                      type: string
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        '400':
          description: Неверные учётные данные

  /auth/v1/logout:
    post:
      tags: [Auth]
      summary: Выход из системы
      operationId: logout
      security:
        - apiKey: []
        - bearerAuth: []
      responses:
        '204':
          description: Выход выполнен

  /auth/v1/recover:
    post:
      tags: [Auth]
      summary: Запрос письма для сброса пароля
      operationId: recoverPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Письмо отправлено

  /auth/v1/user:
    get:
      tags: [Auth]
      summary: Данные текущего авторизованного пользователя
      operationId: getAuthUser
      security:
        - apiKey: []
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUser'
    put:
