      operationId: getMap
      description: |
        Возвращает запись о текущей карте (всегда одна).
        Для получения изображения используйте:
        `GET /storage/v1/object/public/maps/{storage_path}`
      parameters:
        - $ref: '#/components/parameters/selectParam'
        - name: order
          in: query
          schema:
            type: string
          example: created_at.desc
        - name: limit
          in: query
